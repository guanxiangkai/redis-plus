# ------------------------------------------------------------------------------
# Redis Plus 统一配置
# 对应类：com.actomize.redis.plus.autoconfigure.properties.RedisPlusProperties
# ------------------------------------------------------------------------------
redis-plus:
  # ---------- 分布式锁 ----------
  lock:
    # 锁 Key 前缀（由 KeyNamingStrategy 统一拼装，默认输出仍为 key-prefix + 锁名）
    key-prefix: ${REDIS_PLUS_LOCK_PREFIX:demo:lock:}
    # 默认锁租约时长（注解未显式给 leaseTime 时由 LockLeaseStrategy 统一决策）
    default-lease: 30s
    # 默认等待超时（@RedisLock/@RedisReadLock/@RedisWriteLock 未显式给 waitTime 时生效）
    default-wait: 5s

  # ---------- 三级缓存 ----------
  cache:
    # Redis 缓存 Key 前缀；为空表示由业务自行控制 key 命名
    key-prefix: ${REDIS_PLUS_CACHE_PREFIX:demo:cache:}
    # 默认 TTL
    default-ttl: 30m
    # TTL 随机抖动比例，防止同一时刻大量过期造成雪崩（0 = 不抖动，建议 0.1~0.3）
    jitter-ratio: 0.10
    local:
      # L1 本地缓存最大条目数
      maximum-size: 10000
      # L1 本地缓存 TTL（通常远小于 Redis TTL，减少内存占用并及时感知失效）
      ttl: 5m

  # ---------- 缓存增强（布隆过滤器 + 批量操作） ----------
  enhance:
    bloom:
      # 是否启用默认布隆过滤器与 @BloomCheck 切面
      enabled: true
      # 预估元素数量（影响底层 BitMap 大小，过小会升高误判率）
      expected-insertions: 1000000
      # 目标误判率（推荐 0.01 ~ 0.03）
      false-positive-probability: 0.01

  # ---------- 限流 ----------
  ratelimit:
    # 限流 Key 前缀
    key-prefix: ${REDIS_PLUS_RL_PREFIX:demo:ratelimit:}
    # 令牌桶默认每秒补充令牌数；当 @RateLimit(TOKEN_BUCKET) 未显式指定 refillTokens 时回退到该值
    token-bucket-refill-rate: 100

  # ---------- 幂等 ----------
  idempotent:
    # 幂等状态 Key 前缀（最终 Key = key-prefix + @Idempotent 的 key 表达式）
    key-prefix: ${REDIS_PLUS_IDEMPOTENT_PREFIX:demo:idempotent:}

  # ---------- 队列 ----------
  queue:
    # 队列 Key 前缀基名；默认工厂会自动派生 list:/stream: 前缀
    key-prefix: ${REDIS_PLUS_QUEUE_PREFIX:demo:queue:}
    # Stream 队列默认消费组名称
    default-consumer-group: redis-plus-consumers
    # 消费失败最大重试次数（默认工厂会将其映射为固定间隔、非阻塞调度的重试策略）
    max-retry-attempts: 3
    # Stream 队列每次批量拉取消息数（XREADGROUP COUNT 参数）
    batch-size: 10
    # 消费轮询阻塞等待时长（List BRPOP / Stream XREADGROUP BLOCK）
    poll-timeout: 2s

# ------------------------------------------------------------------------------
# Actuator / Micrometer（可选）
# 仅当项目中引入 spring-boot-starter-actuator 时生效
# ------------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  # 开启 Prometheus 格式指标暴露（需引入 micrometer-registry-prometheus）
  # metrics:
  #   export:
  #     prometheus:
  #       enabled: true

# ------------------------------------------------------------------------------
# 日志建议
# ------------------------------------------------------------------------------
logging:
  level:
    com.actomize.redis.plus: INFO
    # 调试时按需开启：
    # com.actomize.redis.plus.lock: DEBUG
    # com.actomize.redis.plus.cache: DEBUG
    # com.actomize.redis.plus.enhance: DEBUG
    # com.actomize.redis.plus.ratelimit: DEBUG
    # com.actomize.redis.plus.idempotent: DEBUG
    # com.actomize.redis.plus.queue: DEBUG
    # com.actomize.redis.plus.datasource: DEBUG
    # io.lettuce.core: INFO

