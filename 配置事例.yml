# ==============================================================================
# Redis Plus 配置示例 (application.yml)
#
# 说明：
#   1. 本文件只保留当前源码中真实支持的配置项，配置前缀均为 redis-plus。
#   2. 单数据源使用 Spring Boot 标准配置 spring.data.redis.*。
#   3. 多数据源使用 redis-plus.datasource.sources.*，由 starter 自动构建连接工厂。
#   4. 未引入 Caffeine 时，L1 本地缓存自动退化为 ConcurrentHashMap。
#   5. 未引入 Micrometer / Actuator 时，指标与健康检查自动跳过。
#   6. 读写锁支持锁降级：同一线程持有写锁期间可直接获取同名读锁（写→读降级）。
#      其他线程仍无法获取读锁，直至写锁持有方完全释放写锁与读锁。
#   7. 锁切面异常传播：若业务方法抛出异常且锁同时过期（WatchDog 续期失败），
#      原始业务异常会正确传播，unlock 失败仅以 WARN 日志记录，不屏蔽原始异常。
#   8. 幂等 FAILED 并发重试已序列化：多个并发请求竞争重试失败态时，仅一个线程
#      通过 Redis CAS 赢得执行权，其余线程收到"正在处理中"响应，杜绝并发重复执行。
#   9. 队列生命周期：使用默认（无参/最小参数）构造器时，队列自持异步执行器；
#      调用 stop() 后执行器会被同步关闭，无后台线程泄漏。
#      传入自定义 asyncExecutor 时，生命周期由调用方管理。
# ==============================================================================

# ──────────────────────────────────────────────────────────────────────────────
# 场景一：单数据源（最常见）
# 直接使用 Spring Boot 标准配置，无需配置 redis-plus.datasource.*。
# ──────────────────────────────────────────────────────────────────────────────
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3s
      connect-timeout: 3s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3s

# ------------------------------------------------------------------------------
# 场景二：多数据源
# 通过 redis-plus.datasource.sources.* 声明所有数据源。
#
# ★ 切换方式说明：
#   sources 下的每一个 key 就是该数据源的「路由标签」，与 @RedisDS 注解值一一对应：
#
#   sources:
#     master:  ← 这个 "master" 就是标签，对应 @RedisDS("master")
#     slave:   ← 这个 "slave" 就是标签，对应 @RedisDS("slave")
#     cache:   ← 这个 "cache" 就是标签，对应 @RedisDS("cache")
#
#   使用方式：
#     1. 注解式（推荐）：
#        @RedisDS("slave")
#        public String get(String key) { return redisTemplate.opsForValue().get(key); }
#
#     2. 编程式：
#        RedisDataSourceContext.callWithSource("cache",
#            () -> redisTemplate.opsForValue().get("hot-key"));
#
#   注意：
#   - primary 指定无 @RedisDS 注解时默认使用哪个数据源（必须在 sources 中存在）
#   - strict=true 时，路由到未声明的标签会抛异常；false 时回退到 primary
